name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint PHP
        run: composer run lint:php

      - name: Prepare SQLite site
        run: |
          mkdir -p web/sites/default/files
          cp web/sites/default/default.settings.php web/sites/default/settings.php
          chmod 666 web/sites/default/settings.php web/sites/default/files
          vendor/bin/drush site:install standard -y -r web --db-url=sqlite://sites/default/files/.ht.sqlite --site-name="Admor CI" --account-name=admin --account-pass=admin

      - name: Drush sanity
        run: |
          vendor/bin/drush cr -r web
          vendor/bin/drush en admor_site -y -r web
